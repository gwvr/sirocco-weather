name: Deploy Forecast

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: Create location config
        run: |
          cat > location.yaml << 'EOF'
          default: harpenden
          locations:
            harpenden:
              name: Harpenden, UK
              lat: 51.81684
              lon: -0.35706
              timezone: Europe/London
              model: ukmo_seamless
              wind_units: mph
              precip_model: ecmwf_ifs025
          EOF
      - run: uv run sirocco
      - name: Prepare pages artifact
        run: |
          mkdir _site
          cp forecast.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
